services:
  - type: web
    name: cruxiq-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health
    # Free tier — spins down after 15 min inactivity; 512 MB RAM
